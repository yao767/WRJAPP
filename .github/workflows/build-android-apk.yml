name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android platform
        run: flutter create . --platforms=android

      - name: Configure Android app label
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          content = manifest.read_text(encoding='utf-8')
          content = content.replace('android:label="drone_guardian_app"', 'android:label="护花使者——植保无人机适配系统APP"')
          content = content.replace('android:label="appdemo"', 'android:label="护花使者——植保无人机适配系统APP"')
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />',
          ]
          for permission in permissions:
              if permission not in content:
                  content = content.replace('<application', f'{permission}\n    <application', 1)
          manifest.write_text(content, encoding='utf-8')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
