name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android platform
        run: flutter create . --platforms=android

      - name: Configure Android app label
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          content = manifest.read_text(encoding='utf-8')
          content = content.replace('android:label="drone_guardian_app"', 'android:label="护花使者——植保无人机适配系统APP"')
          content = content.replace('android:label="appdemo"', 'android:label="护花使者——植保无人机适配系统APP"')
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />',
          ]
          for permission in permissions:
              if permission not in content:
                  content = content.replace('<application', f'{permission}\n    <application', 1)
          manifest.write_text(content, encoding='utf-8')
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create keystore and key.properties (secrets or temporary)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "Using repository secrets for signing."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          else
            echo "Signing secrets not found. Generating temporary keystore on runner."
            ANDROID_KEYSTORE_PASSWORD="123456"
            ANDROID_KEY_ALIAS="upload"
            ANDROID_KEY_PASSWORD="123456"
            keytool -genkeypair -v \
              -keystore android/upload-keystore.jks \
              -alias "$ANDROID_KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -dname "CN=WRJAPP, OU=APP, O=WRJ, L=Nanjing, ST=Jiangsu, C=CN"
          fi

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Configure Gradle release signing
        run: |
          python - <<'PY'
          from pathlib import Path

          gradle_file = Path('android/app/build.gradle.kts')
          content = gradle_file.read_text(encoding='utf-8')

          if 'val keyProperties = Properties().apply {' not in content:
              key_props_block = (
                  'val keyProperties = Properties().apply {\n'
                  '    val keyPropertiesFile = rootProject.file("key.properties")\n'
                  '    if (keyPropertiesFile.exists()) {\n'
                  '        load(keyPropertiesFile.inputStream())\n'
                  '    }\n'
                  '}\n\n'
              )
              anchor = 'val flutterVersionCode'
              if anchor in content:
                  content = content.replace(anchor, key_props_block + anchor, 1)

          if 'signingConfigs {' not in content:
              signing_block = (
                  '    signingConfigs {\n'
                  '        create("release") {\n'
                  '            val storeFilePath = keyProperties["storeFile"] as String?\n'
                  '            if (storeFilePath != null) {\n'
                  '                storeFile = rootProject.file(storeFilePath)\n'
                  '            }\n'
                  '            storePassword = keyProperties["storePassword"] as String?\n'
                  '            keyAlias = keyProperties["keyAlias"] as String?\n'
                  '            keyPassword = keyProperties["keyPassword"] as String?\n'
                  '        }\n'
                  '    }\n\n'
              )
              anchor = '    buildTypes {'
              if anchor in content:
                  content = content.replace(anchor, signing_block + anchor, 1)

          content = content.replace(
              '            signingConfig = signingConfigs.getByName("debug")',
              '            signingConfig = signingConfigs.getByName("release")',
          )

          gradle_file.write_text(content, encoding='utf-8')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Print APK certificate fingerprint
        run: |
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | grep -E 'Owner:|Issuer:|SHA256:'

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
